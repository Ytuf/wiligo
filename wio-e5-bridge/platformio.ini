[env:wio-e5-bridge]
platform = ststm32
board = lora_e5_mini
framework = arduino
monitor_speed = 115200

; FreeWili multiprobe: WIO-E5 is on CMSIS-DAP interface 2.
; PIO's ststm32 platform has no native cmsis-dap upload action, so we drive
; PIO's bundled OpenOCD directly via upload_protocol=custom + extra_scripts.
upload_protocol = custom
extra_scripts = pre:upload_cmsis_dap.py

debug_tool = cmsis-dap
board_debug.tools.cmsis-dap.cmd = cmsis-dap
board_debug.tools.cmsis-dap.server.executable = $PLATFORMIO_CORE_DIR/packages/tool-openocd/bin/openocd
board_debug.tools.cmsis-dap.server.arguments =
  -f interface/cmsis-dap.cfg
  -c "cmsis-dap usb interface 2"
  -f target/stm32wlx.cfg

lib_deps =
  jgromes/RadioLib@^7.1.0

build_flags =
  -D RADIOLIB_LOW_LEVEL=1
  -D RADIOLIB_EXCLUDE_SX127X=1
  -D RADIOLIB_EXCLUDE_SX128X=1
  -D RADIOLIB_EXCLUDE_LR11X0=1
  -D RADIOLIB_EXCLUDE_CC1101=1
  -D RADIOLIB_EXCLUDE_NRF24=1
  -D RADIOLIB_EXCLUDE_RF69=1
  -D RADIOLIB_EXCLUDE_SX1231=1
  -D RADIOLIB_EXCLUDE_SI443X=1
  -D RADIOLIB_EXCLUDE_RFM2X=1
  -D RADIOLIB_EXCLUDE_LR2021=1
  -D RADIOLIB_EXCLUDE_AFSK=1
  -D RADIOLIB_EXCLUDE_AX25=1
  -D RADIOLIB_EXCLUDE_HELLSCHREIBER=1
  -D RADIOLIB_EXCLUDE_MORSE=1
  -D RADIOLIB_EXCLUDE_RTTY=1
  -D RADIOLIB_EXCLUDE_SSTV=1
  -D RADIOLIB_EXCLUDE_APRS=1
  -D RADIOLIB_EXCLUDE_PAGER=1
  -D RADIOLIB_EXCLUDE_LORAWAN=1
  -D RADIOLIB_EXCLUDE_DIRECT_RECEIVE=1
  -D RADIOLIB_EXCLUDE_BELL=1
  -D RADIOLIB_EXCLUDE_FSK4=1
